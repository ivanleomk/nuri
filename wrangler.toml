# Cloudflare Workers configuration for nuri-site
name = "nuri-docs"
main = "docs/worker/index.js"
compatibility_date = "2024-12-01"

# Static assets (CSS, images, etc.)
[assets]
directory = "docs/public"

# Build WASM before deploying (runs from project root)
[build]
command = "cd docs && zig build worker"

# Optional: Add custom domain
# routes = [
#   { pattern = "docs.yourdomain.com", custom_domain = true }
# ]
