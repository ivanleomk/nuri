# Cloudflare Workers configuration for nuri docs site
# Deploy from the docs/ directory: cd docs && npx wrangler deploy

name = "nuri-docs"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# Static assets (CSS, images, etc.)
[assets]
directory = "public"

# Build WASM before deploying
[build]
command = "zig build worker"

# Optional: Add custom domain
# routes = [
#   { pattern = "docs.yourdomain.com", custom_domain = true }
# ]
