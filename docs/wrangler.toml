# Cloudflare Workers configuration for nuri docs site
# Deploy from the docs/ directory

name = "nuri"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# Static assets (CSS, images, etc.)
[assets]
directory = "public"

# Build command - installs Zig and builds WASM in one script
[build]
command = "chmod +x install-zig.sh && ./install-zig.sh"

# Custom domain configuration
[[routes]]
pattern = "nuri.ivanleo.com"
custom_domain = true

# Enable Cloudflare analytics and telemetry
[telemetry]
enabled = true
