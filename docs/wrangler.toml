# Cloudflare Workers configuration for nuri docs site
# Note: WASM must be pre-built locally since Cloudflare Pages doesn't have Zig
# Build locally: cd docs && zig build worker
# Then deploy: npx wrangler deploy

name = "nuri-docs"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# Static assets (CSS, images, etc.)
[assets]
directory = "public"

# Optional: Add custom domain
# routes = [
#   { pattern = "docs.yourdomain.com", custom_domain = true }
# ]
