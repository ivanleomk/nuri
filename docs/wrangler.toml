# Cloudflare Workers configuration for nuri docs site
# Deploy from the docs/ directory

name = "nuri"
main = "worker/index.js"
compatibility_date = "2024-12-01"

# Static assets (CSS, images, etc.)
[assets]
directory = "public"

# Build command - installs Zig if needed, then builds
# Note: Use full path to Zig since PATH doesn't persist between commands
[build]
command = "chmod +x install-zig.sh && ./install-zig.sh && $HOME/.zig/zig build worker"

# Optional: Add custom domain
# routes = [
#   { pattern = "docs.yourdomain.com", custom_domain = true }
# ]
